<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>
        <meta name="description" content="Una calcolatrice semplice, moderna e funzionale">
        
        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website">
        <meta property="og:title" content="Calcolatrice">
        <meta property="og:description" content="Una calcolatrice semplice, moderna e funzionale">
        <meta property="og:image" content="./img/calculator_x512.png">

        <link rel="shortcut icon" href="./img/calculator_x512.png" type="image/x-icon">
        <meta name="theme-color" content="#121026">
        <link rel="apple-touch-icon" href="./img/logo-192.png">
        <link rel="manifest" href="manifest.json">
        
        <!-- Google Fonts & Material Symbols Rounded -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" crossorigin="anonymous">
        
        <link rel="stylesheet" href="./src/index.css">
    </head>
    <body class="dark-theme">
        <div class="app-background">
            <div class="glow-orb orb-1"></div>
            <div class="glow-orb orb-2"></div>
        </div>

        <div class="app-container">
            <main class="calculator-card">
                <header class="calculator-header">
                    <h1 class="app-title">Calcola</h1>
                    <div class="header-actions">
                        <button id="rad-deg-toggle" class="text-btn" aria-label="Toggle angle unit">DEG</button>
                        <button id="sci-toggle" class="icon-btn" aria-label="Toggle scientific keyboard">
                            <span class="material-symbols-rounded">science</span>
                        </button>
                        <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">
                            <span class="material-symbols-rounded">light_mode</span>
                        </button>
                        <button id="history-toggle" class="icon-btn" aria-label="Toggle history panel">
                            <span class="material-symbols-rounded">history</span>
                        </button>
                    </div>
                </header>
                
                <div class="calculator-display">
                    <div class="expression-wrapper">
                        <span id="expression" class="expression">0</span>
                    </div>
                    <div class="result-wrapper">
                        <span id="result" class="result">0</span>
                    </div>
                </div>

                <div class="calculator-buttons">
                    <!-- Scientific Row 1 -->
                    <button id="sin" class="btn btn-sci sci-only" aria-label="Seno">sin</button>
                    <button id="cos" class="btn btn-sci sci-only" aria-label="Coseno">cos</button>
                    <button id="tan" class="btn btn-sci sci-only" aria-label="Tangente">tan</button>
                    <button id="inv" class="btn btn-sci sci-only" aria-label="Inverso">1/x</button>

                    <!-- Scientific Row 2 -->
                    <button id="log" class="btn btn-sci sci-only" aria-label="Logaritmo base 10">log</button>
                    <button id="ln" class="btn btn-sci sci-only" aria-label="Logaritmo naturale">ln</button>
                    <button id="e" class="btn btn-sci sci-only" aria-label="Costante di Eulero">e</button>
                    <button id="fact" class="btn btn-sci sci-only" aria-label="Fattoriale">x!</button>

                    <!-- Row 1: Special Functions -->
                    <button id="sqrt" class="btn btn-func" aria-label="Radice quadrata">√</button>
                    <button id="pi" class="btn btn-func" aria-label="Pi greco">π</button>
                    <button id="elevate" class="btn btn-func" aria-label="Elevamento a potenza">^</button>
                    <button id="brackets" class="btn btn-func" aria-label="Parentesi">( )</button>

                    <!-- Row 2: Actions & Operators -->
                    <button id="ac" class="btn btn-action" aria-label="Cancella tutto">AC</button>
                    <button id="backspace" class="btn btn-action" aria-label="Cancella ultimo">
                        <span class="material-symbols-rounded">backspace</span>
                    </button>
                    <button id="percentage" class="btn btn-op" aria-label="Percentuale">%</button>
                    <button id="division" class="btn btn-op" aria-label="Divisione">÷</button>

                    <!-- Row 3: Numbers & Operators -->
                    <button id="seven" class="btn btn-num">7</button>
                    <button id="eight" class="btn btn-num">8</button>
                    <button id="nine" class="btn btn-num">9</button>
                    <button id="multiplication" class="btn btn-op" aria-label="Moltiplicazione">×</button>

                    <!-- Row 4: Numbers & Operators -->
                    <button id="four" class="btn btn-num">4</button>
                    <button id="five" class="btn btn-num">5</button>
                    <button id="six" class="btn btn-num">6</button>
                    <button id="subtraction" class="btn btn-op" aria-label="Sottrazione">−</button>

                    <!-- Row 5: Numbers & Operators -->
                    <button id="one" class="btn btn-num">1</button>
                    <button id="two" class="btn btn-num">2</button>
                    <button id="three" class="btn btn-num">3</button>
                    <button id="summ" class="btn btn-op" aria-label="Addizione">+</button>

                    <!-- Row 6: Zero, Dot, Equals -->
                    <button id="zero" class="btn btn-num span-two">0</button>
                    <button id="dot" class="btn btn-num">.</button>
                    <button id="calculate" class="btn btn-equals" aria-label="Calcola">=</button>
                </div>
            </main>

            <aside id="history-panel" class="history-panel">
                <div class="history-header">
                    <h2>History</h2>
                    <button id="clear-history" class="icon-btn" aria-label="Clear history">
                        <span class="material-symbols-rounded">delete_sweep</span>
                    </button>
                </div>
                <div id="history-list" class="history-list">
                    <div class="history-empty">No recent calculations</div>
                </div>
            </aside>
        </div>

        <script type="module" src="./src/index.js"></script>
    </body>
</html>
