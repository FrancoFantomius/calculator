<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prova material design 3</title>
</head>
<body>
<p id="demo">Null</p>
<script>
    var current_expression = "785(985(pi)745+3";
    let saved_expression = current_expression.replace(/pi/g, "(3.1415926535897932384626433832795)");
    saved_expression = saved_expression.replace(/×/g, "*");
    saved_expression = saved_expression.replace(/÷/g, "/");
    saved_expression = saved_expression.replace(/√/g, "sqrt(");
    saved_expression = current_expression.replace("(", "*(");
    let result = eval(saved_expression);
    document.getElementById("demo").innerHTML = current_expression + " = " + result;
</script>
</body>
</html>
